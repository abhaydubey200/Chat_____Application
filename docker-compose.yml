services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      REDIS_ENABLED: "true"
      REDIS_URL: "redis://redis:6379/0"
      RATE_LIMIT_STORAGE_URL: "redis://redis:6379/1"
    ports:
      - "8000:8000"
    depends_on:
      - redis

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8000/api"
    ports:
      - "3000:3000"
    depends_on:
      - backend
